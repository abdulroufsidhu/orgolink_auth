name: Build, Compose & Publish to GHCR

on:
  push:
    branches: [ "master", "v*.*.*" ]
  pull_request:
    branches: [ "master", "v*.*.*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🧩 Create env file for compose
      - name: Prepare environment
        run: |
          echo "POSTGRES_DB=orgolink_auth" >> .env
          echo "POSTGRES_USER=orgolink" >> .env
          echo "POSTGRES_PASSWORD=orgolink123" >> .env
          echo "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orgolink_auth" >> .env
          echo "SPRING_DATASOURCE_USERNAME=orgolink" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=orgolink123" >> .env

      # 🏗️ Build and verify using docker compose
      - name: Build & test with docker compose
        run: |
          docker compose up -d --build
          echo "⏳ Waiting for app to start..."
          sleep 30
          docker ps
          echo "🔍 Checking app health endpoint..."
          curl -f http://localhost:8080/public/health || (docker compose logs app && exit 1)
          docker-compose down

      # 🏷️ Tag & Push the app image
      - name: Push app image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          APP_IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/orgolink-auth:latest
          docker tag orgolink-auth-app $APP_IMAGE_NAME
          docker push $APP_IMAGE_NAME
          echo "✅ Published $APP_IMAGE_NAME"

      # 🔏 Optional: Sign image
      - name: Sign published image
        if: github.event_name != 'pull_request'
        env:
          APP_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/orgolink-auth:latest
        run: |
          echo "🔏 Signing image..."
          cosign sign --yes $APP_IMAGE_NAME
